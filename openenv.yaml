spec_version: 1
name: email-triage-openenv
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  AI Email Triage Environment — an agent reads customer support emails,
  classifies them, sets priority, and drafts a professional reply.
  Three graded tasks with explicit grader classes.

benchmark: "meta-hackathon-v1"

tasks:
  - id: task_1
    name: Email Classification
    difficulty: easy
    grader: graders:EasyGrader

  - id: task_2
    name: Priority Detection
    difficulty: medium
    grader: graders:MediumGrader

  - id: task_3
    name: Reply Generation
    difficulty: hard
    grader: graders:HardGrader

observation_space:
  type: object
  fields:
    email_id: str
    subject: str
    body: str
    sender: str
    history: list

action_space:
  type: object
  fields:
    category:
      type: str
      enum: [Billing Refund, Account, Feature Request, Technical Support]
    priority:
      type: str
      enum: [Low, Medium, High]
    reply:
      type: str
