spec_version: 1
name: email-triage-openenv
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  AI Email Triage Environment — an agent reads customer support emails,
  classifies them, sets priority, and drafts a professional reply.
  Three graded tasks with explicit grader classes.

tasks:
  - id: task_easy
    grader: server.graders:EasyGrader

  - id: task_medium
    grader: server.graders:MediumGrader

  - id: task_hard
    grader: server.graders:HardGrader
